<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms - Lets learn it</title>
</head>

<body>
    <h1>Form to apply for Sigma Web Development course - TA </h1>
    <form action="post">
        <div>
            <label for="username">Enter your Username</label>
            <input type="text" id="username" name="username" placeholder="Enter your username" autofocus>
        </div>
        <div>
            <label for="username">Enter your City</label>
            <input type="text" id="city" name="city" placeholder="Enter your city" autofocus>
        </div>
         <div>
            <label for="username">Enter your pincode</label>
            <input type="text" id="pincode" name="pincode" placeholder="Enter your pincode" autofocus>
        </div>
</body>
