<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Interest Calculator</title>
</head>
<body>
    <h2>Simple Interest Calculator</h2>
    <label for="Principal">Principle Amount:</label>
    <input type="number" id="principal" placeholder="Enter principal"><br><br>

    <label for="rate">Rate of interest(% per year):</label>
    <input type="number" id="rate" placeholder="Enter rate"><br><br>

    <label for="time">Time (in years):</label>
    <input type="number" id="time" placeholder="Enter time"><br><br>

    <button onclick="calculateInterest()">Calculate</button>

    <h3 id="result"></h3>

    <script>
        function calculateInterest() {
            let principal = document.getElementById("principal").value;
            let rate = document.getElementById("rate").value;
            let time = document.getElementById("time").value;

            //Formula: SI = (P*R*T)/100
            let simpleInterest = (principal*rate*time)/100;

            document.getElementById("result").innerText ="Simple Interest = " + simpleInterest;
        }
    </script>
    
</body>
</html>
