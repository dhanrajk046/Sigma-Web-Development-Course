    <title>Document</title>
    <style>
        .container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .box {
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .thumbnail {
            position: relative;
        }

        .thumbnail img {
            width: 200px;
            border-radius: 8px;
        }

        .duration {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: black;
            color: white;
            padding: 2px 6px;
            font-size: 12px;
            border-radius: 4px;
        }

        .video-info h3 {
            margin: 0;
            font-size: 16px;
        }

        .meta,
        .channel {
            margin: 4px 0;
            color: #555;
            font-size: 14px;
        }
    </style>
</head>
