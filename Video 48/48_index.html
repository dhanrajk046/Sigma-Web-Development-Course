<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            height: 121px;
            width: 121px;
            background-color: red;
            border-radius: 70px;
            position: absolute;
            bottom: 0;
            left: 0;
            animation: moveBox 3s ease-out forwards; 
                          
        }
        /* @keyframes movebox {
        from {
        transform: translateY(0);
        }
        to {
        transform: translateX(200px) translateY(-200px);
        } */
        @keyframes moveBox {
        0%  {
        transform: translateY(0);
        }
        to {
        transform: translateX(200px) translateY(-200px);
        }

        25%  {
        transform: translateX(200px) translateY(-200px);
         }
         to {
        transform: translateX(400px) translateY(0);
        }

        50%  {
        transform: translateX(400px) translateY(0);
        }
         to {
        transform: translateX(600px) translateY(-200px);
        }
        75%  {
        transform: translateX(600px) translateY(-200px);
         }
         to {
        transform: translateX(800px) translateY(0);
        }




        
         }
        .container {
            position: relative;
            height: 80vh;
            width: 80vw;
            background-color: blue;
        }
 
    </style>
</head>

<body>
    <div class="container">

        <div class="box">
        </div>
    </div>
    <!-- 
   
     -->
</body>

</html>
