<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .card {
            margin: 5px;
            display: flex;
            border: 2px solid black;
            width: 900px;
            justify-content: center;
            align-items: center;
            padding: 12px;

        }

        .image img {
            width: 200px;

        }

        .text h1,
        p {
            padding: 2px 0;
        }

        .image {
            position: relative;
        }

        .capsule {
            position: absolute;
            bottom: 0;
            z-index: 10;
            right: 0;
            background: #463d3d;
            opacity: 0.9;
            color: white;
            padding: 3px;

            border-radius: 3px;
            font-size: 14px;
        }
    </style>


</head>

<body>
    <div class="container">
        <div class="card">
            <div class="img">
                <img src="https://i.ytimg.com/vi/tVzUXW6siu0/hqdefault.jpg?sqp=-oaymwEcCPYBEIoBSFXyq4qpAw4IARUAAIhCGAFwAcABBg==&rs=AOn4CLACwWOixJVrKLFindK92kYMgTcQbw"
                    alt="" class="src">
                <div class="capsule"></div>
            </div>
            <div class="text">
                <h1>
                    Introduction to Backend | Sigma Web Dev video #2
                </h1>
                <p>CodeWithHarry • 560K views • 7 months ago</p>
            </div>

            <!-- <img src="" alt="" class="sc"> -->
        </div>
        <!-- <div class="box"></div> -->
        <!-- <div class="box"></div> -->
        <!-- <div class="box"></div> -->

    </div>

</body>

</html>
